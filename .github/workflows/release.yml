name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 4.3.0)'
        required: true
        type: string
      alpine_version:
        description: 'Alpine.js version to update to (e.g. 3.15.11). Leave empty to skip.'
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Verify tag does not exist
        run: |
          if git rev-parse "v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "Error: Tag v${{ inputs.version }} already exists"
            exit 1
          fi

      - name: Run pre-release
        run: node scripts/pre-release.js ${{ inputs.version }} ${{ inputs.alpine_version }}

      - name: Commit dependency updates to main
        if: inputs.alpine_version != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "Update Alpine to v${{ inputs.alpine_version }}"
          git push origin main

      - name: Create release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dist/
          git commit -m "Build assets for v${{ inputs.version }}"
          git tag v${{ inputs.version }}
          git push origin v${{ inputs.version }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create v${{ inputs.version }} --title "v${{ inputs.version }}" --generate-notes
