name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 3.6.0)'
        required: true
        type: string
      previous_tag:
        description: 'Previous tag for generated release notes (e.g. v3.7.13)'
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ inputs.version }}
      PREVIOUS_TAG: ${{ inputs.previous_tag }}

    steps:
      - name: Normalize version
        run: echo "VERSION=${VERSION#v}" >> $GITHUB_ENV

      - name: Normalize previous tag
        if: env.PREVIOUS_TAG != ''
        run: echo "PREVIOUS_TAG=v${PREVIOUS_TAG#v}" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: 3.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Verify tag does not exist
        run: |
          if git rev-parse "v${{ env.VERSION }}" >/dev/null 2>&1; then
            echo "Error: Tag v${{ env.VERSION }} already exists"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Create release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dist/
          git commit -m "Build assets for v${{ env.VERSION }}"
          git tag v${{ env.VERSION }}
          git push origin v${{ env.VERSION }}

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          args=(v${{ env.VERSION }} --title "v${{ env.VERSION }}" --generate-notes --latest=false)

          if [ -n "${{ env.PREVIOUS_TAG }}" ]; then
            args+=(--notes-start-tag "${{ env.PREVIOUS_TAG }}")
          fi

          gh release create "${args[@]}"
